<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AgriFarm Portal</title>
    
    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Core UI Custom Premium Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">

    <div class="login-card">
        <div class="login-logo">
            <i class="fa-solid fa-wheat-awn"></i>
        </div>
        
        <h2 class="login-title">AgriFarm Portal</h2>
        <p class="login-subtitle">Digital Farm Management Console</p>
        
        <!-- Flash Messages for Login Screen -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert-banner alert-banner-{{ 'success' if category == 'success' else 'danger' if category == 'danger' else 'info' }}" style="margin-bottom: 1.5rem; text-align: left;">
                        <span style="font-size: 0.85rem;"><i class="fa-solid fa-circle-exclamation" style="margin-right: 0.5rem;"></i>{{ message }}</span>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter admin username" required autofocus>
            </div>
            
            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter account password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.8rem;">
                <i class="fa-solid fa-right-to-bracket"></i> Authenticate
            </button>
        </form>
    </div>

</body>
</html>
